        systemTemplate: |+
          分析用户咨询二手车出口的消息，结合对话历史，判断意图，提取检索关键词，输出JSON。

          ## 上下文处理规则：

          信息继承：如果当前消息未提及车型、国家等关键信息，则从对话历史中继承最近的有效信息

          信息更新：如果当前消息明确提及新的车型、国家等信息，则替换历史中的对应信息

          信息累积：如果当前消息是补充说明（如“x1”），则与历史信息合并，形成完整实体（如“宝马x1”）

          ## 意图分析规则：

          inquiry：车源咨询（找车、库存查询、车源推荐）
          clue：生成线索（经过多轮对话，用户有购车意向，且购车需求明确）
          business：业务咨询（物流运输、交易流程、政策法规、售后服务）
          greeting：简单问候（打招呼、无业务咨询、意图模糊）

          ## 返回结果规则：
          请以下面JSON格式返回结果：
          "intent": "意图英文标签",
          "rag_keywords": "RAG检索关键词（核心名词组合，空格分隔）"


        setAnswerContentErrMsg: ''
      retryConfig:
        customOutput: |-
          {
            "intent": "",
            "rag_keywords": ""
          }
